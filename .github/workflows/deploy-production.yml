name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy-production:
    name: Build & Deploy to production
    runs-on: ubuntu-latest
    environment: vps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Build production web
        working-directory: mobile
        run: |
          flutter pub get
          flutter build web --release --base-href=/app/

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Upload production web build
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh root@$VPS_IP "mkdir -p /var/www/luharide-web-production"
          scp -r mobile/build/web/* root@$VPS_IP:/var/www/luharide-web-production/

      - name: Deploy backend + web to production
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh root@$VPS_IP "GH_PAT='$GH_PAT' bash -s" <<'EOF'
          set -e

          REPO_DIR="/var/www/luharide-backend"

          cd "$REPO_DIR"
          PREV_COMMIT="$(git rev-parse HEAD)"
          echo "Previous production commit: $PREV_COMMIT"

          git remote set-url origin "https://techmcu:${GH_PAT}@github.com/techmcu/luharide-app.git"
          git fetch origin
          git checkout main
          git reset --hard origin/main
          git remote set-url origin https://github.com/techmcu/luharide-app.git

          cd backend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run migrate
          pm2 startOrReload pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs --update-env
          pm2 save

          cd "$REPO_DIR"
          mkdir -p /var/www/luharide-cloud /var/www/luharide-web
          rsync -a --delete infra/static-site-luharide-root/ /var/www/luharide-cloud/
          rsync -a --delete /var/www/luharide-web-production/ /var/www/luharide-web/
          rm -rf /var/www/luharide-web-production

          ln -sf /etc/nginx/sites-available/luharide-split /etc/nginx/sites-enabled/luharide-split || true
          rm -f /etc/nginx/sites-enabled/luharide-website || true

          if [ -f "$REPO_DIR/infra/scripts/fix-nginx-duplicate.sh" ]; then
            echo "Running nginx duplicate cleanup..."
            bash "$REPO_DIR/infra/scripts/fix-nginx-duplicate.sh" || echo "Cleanup skipped or not needed"
          fi

          if [ -f "$REPO_DIR/infra/scripts/patch-nginx-caching.sh" ]; then
            echo "Running caching patch..."
            bash "$REPO_DIR/infra/scripts/patch-nginx-caching.sh" || echo "Caching patch skipped or already applied"
          fi

          SITE_CONF="/etc/nginx/sites-available/luharide-split"
          if [ -f "$SITE_CONF" ] && ! grep -q "LUHA_API_PROXY_V1" "$SITE_CONF"; then
            echo "Patching nginx: adding /api + /socket.io proxy to main domain..."
            cp "$SITE_CONF" "${SITE_CONF}.bak.$(date +%s)"
            {
              echo "    # LUHA_API_PROXY_V1 - REST API proxy to Node gateway on :3000"
              echo "    location /api/ {"
              echo "        proxy_pass http://127.0.0.1:3000/api/;"
              echo "        proxy_http_version 1.1;"
              echo "        proxy_set_header Host \$host;"
              echo "        proxy_set_header X-Real-IP \$remote_addr;"
              echo "        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;"
              echo "        proxy_set_header X-Forwarded-Proto \$scheme;"
              echo "        proxy_read_timeout 120s;"
              echo "        proxy_send_timeout 120s;"
              echo "    }"
              echo "    location /socket.io/ {"
              echo "        proxy_pass http://127.0.0.1:3000/socket.io/;"
              echo "        proxy_http_version 1.1;"
              echo "        proxy_set_header Upgrade \$http_upgrade;"
              echo "        proxy_set_header Connection \"upgrade\";"
              echo "        proxy_set_header Host \$host;"
              echo "        proxy_set_header X-Real-IP \$remote_addr;"
              echo "        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;"
              echo "        proxy_set_header X-Forwarded-Proto \$scheme;"
              echo "        proxy_read_timeout 3600s;"
              echo "        proxy_send_timeout 3600s;"
              echo "    }"
            } > /tmp/luha-api-patch.conf
            awk -v patchfile=/tmp/luha-api-patch.conf '
              BEGIN { done = 0 }
              { print }
              !done && /root \/var\/www\/luharide-cloud;/ {
                while ((getline line < patchfile) > 0) print line
                close(patchfile)
                done = 1
              }
              END {
                if (!done) {
                  print "ERROR: Could not find root /var/www/luharide-cloud; line" > "/dev/stderr"
                  exit 1
                }
              }
            ' "$SITE_CONF" > "${SITE_CONF}.new"
            if [ -s "${SITE_CONF}.new" ]; then
              mv "${SITE_CONF}.new" "$SITE_CONF"
              echo "nginx config patched OK"
            else
              echo "ERROR: patched file empty, keeping original"
              rm -f "${SITE_CONF}.new"
              exit 1
            fi
            rm -f /tmp/luha-api-patch.conf
          fi

          nginx -t
          systemctl reload nginx

          echo "Waiting for services..."
          sleep 15
          curl -fsS --max-time 10 http://127.0.0.1:3000/health >/dev/null
          curl -fsS --max-time 10 http://127.0.0.1:3000/api/health >/dev/null
          cd "$REPO_DIR/backend"
          npm run phase4:verify:stack
          echo "Production deploy health checks passed"
          exit 0
          EOF

      # Runs ONLY when deploy failed
      - name: Emergency rollback (previous commit via reflog)
        if: failure()
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh root@$VPS_IP "bash -s" <<'EOF'
          set -e
          REPO_DIR="/var/www/luharide-backend"
          cd "$REPO_DIR"

          ROLLBACK_COMMIT="$(git reflog -n 2 --pretty=format:%H | tail -n 1)"
          if [ -z "$ROLLBACK_COMMIT" ]; then
            echo "Rollback commit not found"
            exit 1
          fi

          echo "Rolling back to: $ROLLBACK_COMMIT"
          git reset --hard "$ROLLBACK_COMMIT"
          cd backend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          pm2 startOrReload pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs --update-env
          pm2 save
          EOF
