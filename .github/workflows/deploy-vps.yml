name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: vps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy to VPS (password-based SSH)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@$VPS_IP "
            cd /var/www/luharide-backend && \
            git remote set-url origin https://techmcu:${GH_PAT}@github.com/techmcu/luharide-app.git && \
            git fetch origin && \
            git reset --hard origin/main && \
            git remote set-url origin https://github.com/techmcu/luharide-app.git && \
            cd backend && \
            npm install && \
            npm run migrate && \
            pm2 restart luharide-api
          "
