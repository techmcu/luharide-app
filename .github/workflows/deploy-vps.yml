name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend_quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: JS syntax check
        run: git ls-files '*.js' | xargs -I{} node --check "{}"

  mobile_quality:
    name: Mobile Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install mobile dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Static analysis
        working-directory: mobile
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Widget tests
        working-directory: mobile
        run: flutter test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: vps
    needs:
      - backend_quality
      - mobile_quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy with health-check and rollback
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@$VPS_IP "GH_PAT='$GH_PAT' bash -s" <<'EOF'
          set -e

          REPO_DIR="/var/www/luharide-backend"
          ECOSYSTEM_FILE="backend/pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs"

          cd "$REPO_DIR"
          PREV_COMMIT="$(git rev-parse HEAD)"
          echo "Previous commit: $PREV_COMMIT"

          git remote set-url origin "https://techmcu:${GH_PAT}@github.com/techmcu/luharide-app.git"
          git fetch origin
          git checkout main
          git reset --hard origin/main
          git remote set-url origin https://github.com/techmcu/luharide-app.git

          cd backend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run migrate
          pm2 startOrReload pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs --update-env
          pm2 save

          echo "Waiting for services..."
          sleep 6
          curl -fsS --max-time 10 http://127.0.0.1:3000/health >/dev/null
          curl -fsS --max-time 10 http://127.0.0.1:3000/api/health >/dev/null
          echo "Deploy health checks passed"
          exit 0
          EOF

      - name: Rollback on deploy failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@$VPS_IP "bash -s" <<'EOF'
          set -e
          REPO_DIR="/var/www/luharide-backend"
          cd "$REPO_DIR"

          # Use reflog to revert to commit before the last hard reset/pull.
          ROLLBACK_COMMIT="$(git reflog -n 2 --pretty=format:%H | tail -n 1)"
          if [ -z "$ROLLBACK_COMMIT" ]; then
            echo "Rollback commit not found"
            exit 1
          fi

          echo "Rolling back to: $ROLLBACK_COMMIT"
          git reset --hard "$ROLLBACK_COMMIT"
          cd backend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          pm2 startOrReload pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs --update-env
          pm2 save
          EOF
