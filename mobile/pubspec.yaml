name: luharide
description: Uttarakhand taxi booking platform - Legal taxi aggregator with seat booking system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^12.1.3
  
  # API & Network
  dio: ^5.4.0
  http: ^1.1.2
  socket_io_client: ^2.0.3+1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  
  # Images & Files
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Notifications (temporarily disabled - will add later)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.9
  # flutter_local_notifications: ^16.3.0
  
  # Permissions
  permission_handler: ^11.2.0
  
  # Utils
  intl: ^0.18.1
  flutter_typeahead: ^5.2.0
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  
  # Authentication
  pinput: ^3.0.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
