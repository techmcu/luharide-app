name: luharide
description: Uttarakhand taxi booking platform - Legal taxi aggregator with seat booking system
publish_to: 'none'
version: 1.0.0+17

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # API & Network
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # Images & Files
  image_picker: ^1.0.7
  cross_file: ^0.3.4
  cached_network_image: ^3.3.1

  # Push notifications (FCM)
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^18.0.1

  # In-App Update (Google Play)
  in_app_update: ^4.2.3

  # UI Effects
  shimmer: ^3.0.0

  # Utils
  package_info_plus: ^8.0.0
  intl: ^0.20.2
  url_launcher: ^6.2.3
  share_plus: ^7.2.1

  # Authentication
  pinput: ^3.0.1
  pdfx: ^2.9.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/luharide_launcher_master.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/luharide_launcher_master.png
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
  web:
    generate: true
