name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

# Never run two staging deploys at once; let an in-progress one finish.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Build & Deploy to staging
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      # Only rebuild the (expensive) Flutter web bundle when mobile actually
      # changed. A manual run (workflow_dispatch) always rebuilds. Backend is
      # always synced below regardless — only the web build is gated.
      - name: Detect changed areas
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mobile=true" >> "$GITHUB_OUTPUT"
          else
            changed="$(git diff --name-only HEAD~1 HEAD || true)"
            echo "Changed files:"; echo "$changed"
            if echo "$changed" | grep -q '^mobile/'; then
              echo "mobile=true" >> "$GITHUB_OUTPUT"
            else
              echo "mobile=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Flutter
        if: steps.changes.outputs.mobile == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Build staging web
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: |
          flutter pub get
          flutter build web --release --base-href=/app/ --dart-define=API_BASE_URL=https://staging.luharide.cloud/api/v1 --dart-define=SOCKET_URL=https://staging.luharide.cloud

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      # Gated to match the build step above: when mobile didn't change there is
      # no fresh bundle to upload, so we keep the existing one already on the VPS.
      - name: Upload web build to staging
        if: steps.changes.outputs.mobile == 'true'
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh root@$VPS_IP "mkdir -p /var/www/luharide-web-staging"
          tar czf - -C mobile/build/web . | ssh root@$VPS_IP "tar xzf - -C /var/www/luharide-web-staging/"

      - name: Deploy backend to staging directory
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh root@$VPS_IP "GH_PAT='$GH_PAT' bash -s" <<'EOF'
          set -e

          REPO_DIR="/var/www/luharide-backend"
          STAGING_DIR="/var/www/luharide-staging"

          # ── Pull latest code into staging dir ──
          if [ ! -d "$STAGING_DIR/.git" ]; then
            git clone "$REPO_DIR" "$STAGING_DIR"
          fi
          cd "$STAGING_DIR"
          git remote set-url origin "https://techmcu:${GH_PAT}@github.com/techmcu/luharide-app.git"
          git fetch origin
          git checkout main
          git reset --hard origin/main
          git remote set-url origin https://github.com/techmcu/luharide-app.git

          # ── Copy .env from production (DB creds, JWT secret, etc.) ──
          cp "$REPO_DIR/backend/.env" "$STAGING_DIR/backend/.env" 2>/dev/null || true

          # ── Symlink uploads so staging serves same files as production ──
          if [ -d "$REPO_DIR/uploads" ]; then
            rm -rf "$STAGING_DIR/uploads"
            ln -sf "$REPO_DIR/uploads" "$STAGING_DIR/uploads"
          fi

          # ── Install deps ──
          cd backend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          echo "Staging code synced and dependencies installed"
          EOF

      - name: Start staging services & health-check
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh root@$VPS_IP "bash -s" <<'EOF'
          set -e
          STAGING_DIR="/var/www/luharide-staging"
          cd "$STAGING_DIR/backend"

          # ── Start staging processes on ports 3100-3104 ──
          # Stop old staging processes if any
          pm2 delete staging-auth-service staging-core-ride-service staging-union-admin-service staging-platform-admin-service staging-api-gateway 2>/dev/null || true

          # Start staging processes on ports 3100-3104
          pm2 start pm2-ecosystem-staging.config.cjs --update-env
          echo "Staging processes started, waiting for boot..."
          sleep 20

          # Health check with retries (3 attempts, 10s apart)
          echo "Checking staging gateway health..."
          for i in 1 2 3; do
            if curl -fsS --max-time 10 http://127.0.0.1:3100/health >/dev/null 2>&1; then
              echo "✅ Staging gateway healthy"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "❌ Staging gateway failed after 3 attempts"
              pm2 logs staging-api-gateway --lines 30 --nostream || true
              exit 1
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          curl -fsS --max-time 10 http://127.0.0.1:3100/api/health >/dev/null
          echo "✅ Staging API healthy"

          echo "All staging health checks passed"
          EOF

      - name: Save staging processes
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh root@$VPS_IP "pm2 save --force"
          echo "Staging is live at https://staging.luharide.cloud"
