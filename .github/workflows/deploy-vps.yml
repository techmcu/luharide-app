name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: vps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy with health-check and rollback
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@$VPS_IP "GH_PAT='$GH_PAT' bash -s" <<'EOF'
          set -e

          REPO_DIR="/var/www/luharide-backend"
          ECOSYSTEM_FILE="backend/pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs"

          cd "$REPO_DIR"
          PREV_COMMIT="$(git rev-parse HEAD)"
          echo "Previous commit: $PREV_COMMIT"

          git remote set-url origin "https://techmcu:${GH_PAT}@github.com/techmcu/luharide-app.git"
          git fetch origin
          git checkout main
          git reset --hard origin/main
          git remote set-url origin https://github.com/techmcu/luharide-app.git

          cd backend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run migrate
          pm2 startOrReload pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs --update-env
          pm2 save

          cd "$REPO_DIR"
          mkdir -p /var/www/luharide-cloud /var/www/luharide-web
          rsync -a --delete infra/static-site-luharide-root/ /var/www/luharide-cloud/
          rsync -a --delete webapp/ /var/www/luharide-web/
          # Keep existing live nginx config (including SSL blocks) intact.
          # Only ensure split site stays enabled.
          ln -sf /etc/nginx/sites-available/luharide-split /etc/nginx/sites-enabled/luharide-split || true
          rm -f /etc/nginx/sites-enabled/luharide-website || true

          # Ensure /api + /socket.io are proxied from luharide.cloud (main domain)
          # to avoid ERR_CERT_COMMON_NAME_INVALID on api.* (no SSL cert there).
          # Idempotent: skips if markers already present.
          SITE_CONF="/etc/nginx/sites-available/luharide-split"
          if [ -f "$SITE_CONF" ] && ! grep -q "# LUHA_API_PROXY_V1" "$SITE_CONF"; then
            echo "Patching nginx: adding /api + /socket.io proxy to main domain..."
            cp "$SITE_CONF" "${SITE_CONF}.bak.$(date +%s)"
            python3 <<'PY'
import re, sys
p = "/etc/nginx/sites-available/luharide-split"
with open(p) as f:
    conf = f.read()

patch = """
    # LUHA_API_PROXY_V1 — REST API proxy → Node gateway on :3000
    client_max_body_size 30m;
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
"""

pattern = re.compile(
    r'(server\s*\{[^}]*?server_name\s+luharide\.cloud[^;]*;[^}]*?root\s+/var/www/luharide-cloud\s*;[^}]*?index\s+index\.html\s*;)',
    re.DOTALL,
)
m = pattern.search(conf)
if not m:
    sys.stderr.write("Could not find main domain server block to patch.\n")
    sys.exit(1)

new_conf = conf[:m.end()] + patch + conf[m.end():]
with open(p, "w") as f:
    f.write(new_conf)
print("nginx patched OK")
PY
          fi

          nginx -t
          systemctl reload nginx

          echo "Waiting for services..."
          sleep 15
          curl -fsS --max-time 10 http://127.0.0.1:3000/health >/dev/null
          curl -fsS --max-time 10 http://127.0.0.1:3000/api/health >/dev/null
          cd "$REPO_DIR/backend"
          npm run phase4:verify:stack
          echo "Deploy health checks passed"
          exit 0
          EOF

      - name: Rollback on deploy failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@$VPS_IP "bash -s" <<'EOF'
          set -e
          REPO_DIR="/var/www/luharide-backend"
          cd "$REPO_DIR"

          # Use reflog to revert to commit before the last hard reset/pull.
          ROLLBACK_COMMIT="$(git reflog -n 2 --pretty=format:%H | tail -n 1)"
          if [ -z "$ROLLBACK_COMMIT" ]; then
            echo "Rollback commit not found"
            exit 1
          fi

          echo "Rolling back to: $ROLLBACK_COMMIT"
          git reset --hard "$ROLLBACK_COMMIT"
          cd backend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          pm2 startOrReload pm2-ecosystem-luharide-api-gateway-and-microservices.config.cjs --update-env
          pm2 save
          EOF
