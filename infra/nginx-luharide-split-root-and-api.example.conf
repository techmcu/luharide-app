# =============================================================================
# Split: ROOT domain = public website (HTML) | api.* = LuhaRide Node gateway :3000
#
# Automated setup on VPS (clone repo, then):
#   sudo bash infra/scripts/setup-root-website-nginx.sh
# =============================================================================
# Why: https://luharide.cloud/ was showing JSON from the API gateway because nginx
# sent all hosts to Node. Use separate server_name blocks.
#
# DEPLOY (VPS):
#   1) sudo mkdir -p /var/www/luharide-cloud
#   2) Copy repo file infra/static-site-luharide-root/index.html → that folder
#      (Landing: sidebar search + login/signup → API https://api.luharide.cloud)
#   2b) Backend .env: CORS_ALLOWED_ORIGINS=https://luharide.cloud,https://www.luharide.cloud
#   3) sudo cp nginx-luharide-split-root-and-api.example.conf \
#        /etc/nginx/sites-available/luharide-split
#   4) Edit: replace luharide.cloud if your domain differs; fix ssl_certificate paths
#      after certbot, or run certbot on HTTP-only config first.
#   5) sudo ln -sf /etc/nginx/sites-available/luharide-split /etc/nginx/sites-enabled/
#   6) sudo nginx -t && sudo systemctl reload nginx
#   7) sudo certbot --nginx -d luharide.cloud -d www.luharide.cloud
#      (api subdomain cert is separate: -d api.luharide.cloud)
# =============================================================================

# --- API (microservices gateway) — api.luharide.cloud -----------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.luharide.cloud;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# After certbot for api.*, certbot adds listen 443 ssl; or merge with your existing
# api server block from certbot.

# --- Public website — luharide.cloud + www (static HTML, NOT Node) ------------
server {
    listen 80;
    listen [::]:80;
    server_name luharide.cloud www.luharide.cloud;

    root /var/www/luharide-cloud;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Run: sudo certbot --nginx -d luharide.cloud -d www.luharide.cloud
# Certbot will add ssl server blocks for 443 on this server_name.
