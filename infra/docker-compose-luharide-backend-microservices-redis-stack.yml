# LuhaRide — Docker Compose: API gateway + 4 backend microservices + Redis
# File name describes stack: backend services, Redis, shared PostgreSQL via host .env
#
# Usage (from repo root):
#   docker compose -f infra/docker-compose-luharide-backend-microservices-redis-stack.yml up --build
#
# Set DB_* and JWT_* in backend/.env or use env_file paths below.
# Flutter: API_BASE_URL → http://localhost:3000 (gateway).

services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - luharide_redis_data_volume:/data

  gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: node gateway/server.js
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      TRUST_PROXY: "1"
      GATEWAY_PORT: "3000"
      AUTH_URL: http://auth:3001
      CORE_URL: http://core:3002
      UNION_URL: http://union:3003
      PLATFORM_URL: http://platform:3004
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - auth
      - core
      - union
      - platform
    volumes:
      - ../backend/uploads:/app/uploads

  auth:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: node microservices/authService.js
    expose:
      - "3001"
    environment:
      AUTH_SERVICE_PORT: "3001"
    env_file:
      - ../backend/.env

  core:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: node microservices/coreService.js
    expose:
      - "3002"
    environment:
      CORE_SERVICE_PORT: "3002"
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    volumes:
      - ../backend/uploads:/app/uploads

  union:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: node microservices/unionService.js
    expose:
      - "3003"
    environment:
      UNION_SERVICE_PORT: "3003"
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    env_file:
      - ../backend/.env
    depends_on:
      - redis

  platform:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: node microservices/platformService.js
    expose:
      - "3004"
    environment:
      PLATFORM_SERVICE_PORT: "3004"
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    volumes:
      - ../backend/uploads:/app/uploads

volumes:
  luharide_redis_data_volume:
