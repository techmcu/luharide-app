name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: vps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'EOF'
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@$VPS_IP "
            cd /var/www/luharide-backend && \
            git remote set-url origin https://techmcu:${GH_PAT}@github.com/techmcu/luharide-app.git && \
            git fetch origin && \
            git reset --hard origin/main && \
            git remote set-url origin https://github.com/techmcu/luharide-app.git && \
            cd backend && \
            npm install && \
            npm run migrate && \
            pm2 restart luharide-api
          "
