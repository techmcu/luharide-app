# =============================================================================
# Split: ROOT domain = public website (HTML) | /app = Flutter web app | api.* = Node gateway
#
# Automated setup on VPS (clone repo, then):
#   sudo bash infra/scripts/setup-root-website-nginx.sh
# =============================================================================
# Why: https://luharide.cloud/ was showing JSON from the API gateway because nginx
# sent all hosts to Node. Use separate server_name blocks.
#
# DEPLOY (VPS):
#   1) sudo mkdir -p /var/www/luharide-cloud /var/www/luharide-web
#   2) Copy repo file infra/static-site-luharide-root/index.html → /var/www/luharide-cloud/
#   3) Copy Flutter web build → /var/www/luharide-web/
#   2b) Backend .env: CORS_ALLOWED_ORIGINS=https://luharide.cloud,https://www.luharide.cloud
#   3) sudo cp nginx-luharide-split-root-and-api.example.conf \
#        /etc/nginx/sites-available/luharide-split
#   4) Edit: replace luharide.cloud if your domain differs; fix ssl_certificate paths
#      after certbot, or run certbot on HTTP-only config first.
#   5) sudo ln -sf /etc/nginx/sites-available/luharide-split /etc/nginx/sites-enabled/
#   6) sudo nginx -t && sudo systemctl reload nginx
#   7) sudo certbot --nginx -d luharide.cloud -d www.luharide.cloud
#      (api subdomain cert is separate: -d api.luharide.cloud)
# =============================================================================

# --- API (microservices gateway) — api.luharide.cloud -----------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.luharide.cloud;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Driver/union KYC uploads (multipart). Default 1m causes HTTP 413 from nginx.
    client_max_body_size 30m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# After certbot for api.*, certbot adds listen 443 ssl; or merge with your existing
# api server block from certbot.

# --- Public website — luharide.cloud + www (static) + /app (Flutter web) -----
server {
    listen 80;
    listen [::]:80;
    server_name luharide.cloud www.luharide.cloud;

    root /var/www/luharide-cloud;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # KYC uploads (multipart). Default 1m → HTTP 413 without this.
    client_max_body_size 30m;

    # REST API proxy → Node gateway on :3000
    # Avoids ERR_CERT_COMMON_NAME_INVALID on api.* subdomain (no cert there).
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Socket.IO proxy (WebSocket upgrade) → Node gateway on :3000
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Flutter web app at /app/ with aggressive caching for performance
    location /app/ {
        alias /var/www/luharide-web/;
        try_files $uri $uri/ /app/index.html;
        
        # Cache static assets aggressively (JS, CSS, fonts, images)
        location ~ \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|wasm)$ {
            alias /var/www/luharide-web/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Cache JSON manifests for 1 hour
        location ~ \.(json)$ {
            alias /var/www/luharide-web/;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
        
        # Don't cache index.html (always fresh)
        location = /app/index.html {
            alias /var/www/luharide-web/index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}

# Run: sudo certbot --nginx -d luharide.cloud -d www.luharide.cloud
# Certbot will add ssl server blocks for 443 on this server_name.
